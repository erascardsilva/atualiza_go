name: Snapcraft CI/CD

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - name: Checkout project
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.22'


      - name: Snapcraft Build
        uses: snapcore/action-build@v1
        id: build

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: snap-package
          path: ${{ steps.build.outputs.snap }}

      - name: Publicar no Snap Store
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        continue-on-error: true
        env:
          SNAPCRAFT_STORE_CREDENTIALS: ${{ secrets.SNAPCRAFT_STORE_CREDENTIALS }}
        run: |
          snapcraft upload ${{ steps.build.outputs.snap }} --release edge --verbose

      - name: Criar GitHub Release
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ steps.build.outputs.snap }}
          tag_name: "v${{ github.run_number }}"
          name: "Atualiza GO - Lançamento #${{ github.run_number }}"
          body: "Versão oficial e irrestrita do Atualiza GO (Instalação via arquivo .snap ou manual)."
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
