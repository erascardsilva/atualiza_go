name: "atualiza-go"
arch: "amd64"
platform: "linux"
version: "2.6.0"
section: "default"
priority: "extra"
maintainer: "Erasmo Cardoso - Software Engineer | Electronics Specialist <erasmo@vmi-informatica.com.br>"
description: "A modern graphical linux system updater"
homepage: "https://github.com/erascardsilva/atualiza_go"
license: "MIT"
contents:
  - src: ./build/bin/atualiza_go
    dst: /usr/bin/atualiza_go
  - src: ./build/linux/atualiza-go.desktop
    dst: /usr/share/applications/atualiza-go.desktop
  - src: ./snap/gui/atualiza-go.png
    dst: /usr/share/pixmaps/atualiza-go.png
depends:
  - pkexec | policykit-1 | polkit
  - libwebkit2gtk-4.1-0 | libwebkit2gtk-4.0-37
  - x11-utils
  - libgtk-3-0t64 | libgtk-3-0
  - libglib2.0-0t64 | libglib2.0-0
overrides:
  rpm:
    depends:
      - polkit
      - webkit2gtk4.0
      - gtk3
      - glib2
